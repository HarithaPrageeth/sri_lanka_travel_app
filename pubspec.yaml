name: sri_lanka_travel_app
description: A beautiful travel app showcasing Sri Lanka
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1  # Add this line

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# Add this section at the bottom
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0077B6"  # Ocean Blue
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21